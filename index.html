<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FestaKids: Crea Inviti Magici per Bambini 🎂</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FestaKids" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
          }).catch(err => {
            console.log('SW registration failed:', err);
          });
        });
      }

      // Capture the install prompt
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        console.log('Install prompt captured');
        // Notify the app that installation is available
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });

      window.addEventListener('appinstalled', () => {
        console.log('App was installed');
        window.deferredPrompt = null;
      });

      // Suppress benign developer-mode WebSocket errors
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        const message = typeof reason === 'string' ? reason : (reason?.message || '');
        if (message.includes('WebSocket') || message.includes('[vite]')) {
          event.preventDefault();
        }
      });
      window.addEventListener('error', (event) => {
        if (event.message?.includes('WebSocket') || event.message?.includes('[vite]')) {
          event.preventDefault();
        }
      });
    </script>
